name: DevOps Portfolio CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Show folder structure (debug)
      - name: Debug Files
        run: ls -R

      # 3. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 4. Install dependencies
      - name: Install Dependencies
        working-directory: frontend
        run: npm install

      # 5. Build React app
      - name: Build App
        working-directory: frontend
        run: npm run build

      # 6. Login to Docker Hub
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 7. Build Docker Image
      - name: Build Docker Image
        working-directory: frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-frontend:latest .

      # 8. Push Docker Image
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-frontend:latest
