name: Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Find package.json (DEBUG)
        run: |
          echo "Searching for package.json..."
          find . -name package.json

      - name: Install & Build
        run: |
          cd $(dirname $(find . -name package.json | grep frontend))
          npm install
          npm run build

      - name: Docker Build
        run: |
          cd $(dirname $(find . -name package.json | grep frontend))
          docker build -t portfolio-frontend .
